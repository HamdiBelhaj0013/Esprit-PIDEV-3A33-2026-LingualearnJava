<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <script src="https://js.hcaptcha.com/1/api.js?host=127.0.0.1" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 320px;
            min-height: 78px;
            background: #ffffff;
            overflow: visible;
        }
        .captcha-wrapper {
            width: 320px;
            min-height: 78px;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 4px;
        }
    </style>
</head>
<body>
<div class="captcha-wrapper">
    <div class="h-captcha"
         data-sitekey="e76e241a-a3ba-4a6a-989a-3fbe50840714"
         data-callback="onCaptchaSuccess"
         data-expired-callback="onCaptchaExpired"
         data-closed-callback="onCaptchaClosed"
         data-theme="light"
         data-size="normal">
    </div>
</div>

<script>
    var captchaToken = "";

    function onCaptchaSuccess(token) {
        captchaToken = token;
        console.log("[hCaptcha] Solved. Token starts with: " + token.substring(0, 20));
    }

    function onCaptchaExpired() {
        captchaToken = "";
        console.log("[hCaptcha] Token expired.");
    }

    function onCaptchaClosed() {
        console.log("[hCaptcha] Widget closed. Token present: " + (captchaToken !== ""));
    }

    function getToken() {
        return captchaToken;
    }

    function resetCaptcha() {
        captchaToken = "";
        if (typeof hcaptcha !== "undefined") {
            hcaptcha.reset();
        }
        console.log("[hCaptcha] Reset.");
    }

    function isTokenReady() {
        return captchaToken !== "";
    }
</script>
</body>
</html>
